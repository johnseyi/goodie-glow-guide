[build]
  publish = "src"

# Service worker must never be cached by the CDN
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Short cache for app files (no content hashes in filenames — must revalidate on deploy)
[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# SPA fallback — all paths serve index.html so hash routing works
[[redirects]]
  from = "/*"
  to   = "/index.html"
  status = 200
