[build]
  publish = "src"

# Service worker must never be cached by the CDN
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Long-lived cache for versioned static assets
[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# SPA fallback — all paths serve index.html so hash routing works
[[redirects]]
  from = "/*"
  to   = "/index.html"
  status = 200
